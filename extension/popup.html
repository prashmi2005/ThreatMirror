<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      background: #0a0a0a;
      color: white;
      font-family: 'Inter', sans-serif;
      padding: 20px;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .title {
      font-weight: 800;
      text-transform: uppercase;
      font-size: 14px;
      letter-spacing: 0.1em;
    }
    .status {
      padding: 12px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid #10b981;
      border-radius: 8px;
      color: #10b981;
      font-size: 12px;
      text-align: center;
    }
    .footer {
      margin-top: 20px;
      font-size: 10px;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div style="font-size: 20px;">🛡️</div>
    <div class="title">ThreatMirror Guardian</div>
  </div>
  <div class="status">
    AI Protection is Active
  </div>
  <p style="font-size: 12px; color: #aaa; line-height: 1.6;">
    The Guardian is watching your Gmail in real-time. Open any email to see the threat analysis card.
  </p>
  <div class="footer">
    ThreatMirror Guardian v1.0
  </div>
</body>
</html>
